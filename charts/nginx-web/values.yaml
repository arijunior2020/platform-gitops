replicaCount: 2

image:
  tag: "1.27-alpine"

namespace: nginx-web

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

serverBlock: |
  server {
    listen 80;
    server_name _;

    location / {
      add_header Content-Type text/plain;
      return 200 'Hello from NGINX via ArgoCD Helm!';
    }

    location /health {
      add_header Content-Type text/plain;
      return 200 'OK';
    }
  }